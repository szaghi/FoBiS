# Build, install, and smoke-test FoBiS.py across the supported Python/OS matrix.
name: Python package

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install ruff
      run: pip install ruff
    - name: Lint
      run: ruff check fobis/ tests/
    - name: Format check
      run: ruff format --check fobis/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install gfortran
      run: sudo apt-get install -y gfortran
    - name: Install package + test deps
      run: pip install -e ".[dev]"
    - name: Run pytest with coverage
      run: pytest
    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: docs/public/coverage*.json
        retention-days: 7

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: pip install -e .

    - name: Test fobis entry point
      run: |
        python --version
        pip list
        fobis -v
        fobis --help

    - name: Test FoBiS.py entry point (Linux/macOS only)
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
      run: |
        FoBiS.py -v
        FoBiS.py --help

  wheel-roundtrip:
    # Build a real wheel, install it into a clean venv with no source-tree
    # access, then run the packaging-regression tests against the installed
    # package.  Catches package-data omissions (e.g. dot-directory files
    # missing from `scaffolds/.github/`) before they reach PyPI.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Build wheel + sdist
      run: |
        pip install build
        python -m build
    - name: Install wheel into a fresh venv
      run: |
        python -m venv /tmp/venv-wheel
        /tmp/venv-wheel/bin/pip install --upgrade pip
        /tmp/venv-wheel/bin/pip install dist/*.whl pytest
    - name: Verify scaffold manifest is fully packaged
      # Run the regression test from a working directory that has NO
      # access to the source tree, so the test resolves files via the
      # installed package only.  Copy just the one test file in.
      run: |
        mkdir /tmp/wheel-test
        cp tests/test_scaffold.py /tmp/wheel-test/
        cd /tmp/wheel-test
        /tmp/venv-wheel/bin/pytest test_scaffold.py::test_every_manifest_source_is_packaged -v
    - name: Smoke-test entry points from the installed wheel
      run: |
        /tmp/venv-wheel/bin/fobis -v
        /tmp/venv-wheel/bin/fobis --help
    - name: Upload built distribution
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
        retention-days: 7

  publish:
    needs: [lint, test, build, wheel-roundtrip]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write   # required for OIDC Trusted Publisher
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Build distribution
      run: |
        pip install build
        python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
