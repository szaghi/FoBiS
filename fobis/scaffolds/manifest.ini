# FoBiS scaffold manifest
# Each section is a destination path relative to the project root.
# source   = path inside fobis/scaffolds/ (verbatim/ or templated/)
# category = verbatim | templated
# executable = true | false (default: false)

[.github/workflows/ci.yml]
source = verbatim/.github/workflows/ci.yml
category = verbatim

[.github/workflows/docs.yml]
source = verbatim/.github/workflows/docs.yml
category = verbatim

[.github/actions/setup-build-env/action.yml]
source = verbatim/.github/actions/setup-build-env/action.yml
category = verbatim

[.github/actions/run-coverage-analysis/action.yml]
source = verbatim/.github/actions/run-coverage-analysis/action.yml
category = verbatim

[scripts/release.sh]
source = verbatim/scripts/release.sh
category = verbatim
executable = true

[scripts/run_tests.sh]
source = verbatim/scripts/run_tests.sh
category = verbatim
executable = true

[scripts/install.sh]
source = verbatim/scripts/install.sh
category = verbatim
executable = true

[scripts/compute-coverage.sh]
source = verbatim/scripts/compute-coverage.sh
category = verbatim
executable = true

[docs/package.json]
source = verbatim/docs/package.json
category = verbatim

[cliff.toml]
source = verbatim/cliff.toml
category = verbatim

[CONTRIBUTING.md]
source = verbatim/CONTRIBUTING.md
category = verbatim

[LICENSE.gpl3.md]
source = verbatim/LICENSE.gpl3.md
category = verbatim

[.github/workflows/release.yml]
source = templated/.github/workflows/release.yml
category = templated

[docs/.vitepress/config.mts]
source = templated/docs/.vitepress/config.mts
category = templated

[docs/ford.md]
source = templated/docs/ford.md
category = templated

[fpm.toml]
source = templated/fpm.toml
category = templated
